server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://stepbible:8989;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Try to bypass security by setting desktop mode headers
        proxy_set_header X-Desktop-Mode "true";
        proxy_set_header X-STEP-Desktop "true";
    }

    # Large client header buffers to avoid 400 errors
    large_client_header_buffers 4 32k;
}